name: Fetch match results

on:
  schedule:
    # Every 15 minutes. GitHub Actions cron uses UTC.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping cron endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS --max-time 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/fetch-results"